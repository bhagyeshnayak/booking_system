{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="pageTitle">Movie Details — CineBook</title>
  <meta name="description" content="Movie details and booking on CineBook." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{% static 'css/style.css' %}?v=2" />
  <style>
    /* ── Critical Inline ── */
    .hidden { display: none !important; }
    body { background: #0d0d0f; color: #f0f0f0; margin: 0; font-family: 'Inter', sans-serif; }

    /* ── Hero Banner ── */
    .detail-hero {
      position: relative;
      height: 480px;
      overflow: hidden;
      margin-top: 70px; /* nav height */
    }
    .hero-backdrop {
      position: absolute; inset: 0;
      background: linear-gradient(135deg, #1a0a12, #0a0a1a, #1a1a0a);
      display: flex; align-items: center; justify-content: center;
      font-size: 8rem;
    }
    .hero-backdrop img {
      width: 100%; height: 100%; object-fit: cover;
      filter: brightness(0.35) blur(2px);
      position: absolute; inset: 0;
    }
    .hero-backdrop-emoji { position: relative; z-index: 1; opacity: 0.3; }
    .hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to right, rgba(13,13,15,0.95) 40%, transparent 80%),
                  linear-gradient(to top, rgba(13,13,15,1) 0%, transparent 40%);
    }
    .hero-content {
      position: absolute; bottom: 40px; left: 0; right: 0;
      max-width: 1400px; margin: 0 auto; padding: 0 40px;
      display: flex; align-items: flex-end; gap: 36px;
    }
    .hero-poster {
      width: 160px; height: 240px; flex-shrink: 0;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.7);
      border: 2px solid rgba(255,255,255,0.1);
      background: #1c1c20;
      display: flex; align-items: center; justify-content: center;
      font-size: 4rem;
    }
    .hero-poster img { width: 100%; height: 100%; object-fit: cover; }
    .hero-info { flex: 1; padding-bottom: 8px; }
    .hero-genre-badge {
      display: inline-block;
      background: rgba(248,68,100,0.2);
      color: #f84464;
      border: 1px solid rgba(248,68,100,0.4);
      padding: 4px 14px; border-radius: 20px;
      font-size: 0.78rem; font-weight: 700; letter-spacing: 0.5px;
      margin-bottom: 12px;
      text-transform: uppercase;
    }
    .hero-title {
      font-size: clamp(1.8rem, 4vw, 3rem);
      font-weight: 800; line-height: 1.15;
      margin-bottom: 12px;
    }
    .hero-meta {
      display: flex; flex-wrap: wrap; align-items: center; gap: 12px;
      font-size: 0.875rem; color: #a0a0b0;
      margin-bottom: 16px;
    }
    .hero-meta .sep { color: #3a3a4a; }
    .hero-meta .star { color: #fbbf24; }
    .hero-meta .rating-val { font-weight: 700; color: #f0f0f0; }
    .hero-desc {
      font-size: 0.95rem; color: #a0a0b0;
      line-height: 1.7; max-width: 580px;
    }
    .hero-actions {
      display: flex; gap: 14px; margin-top: 24px; flex-wrap: wrap;
    }
    .btn-book-hero {
      display: inline-flex; align-items: center; gap: 10px;
      background: linear-gradient(135deg, #f84464, #ff6b35);
      color: #fff; font-weight: 700; font-size: 1rem;
      padding: 14px 32px; border-radius: 50px;
      border: none; cursor: pointer;
      transition: all 0.2s; letter-spacing: 0.3px;
      box-shadow: 0 6px 24px rgba(248,68,100,0.35);
    }
    .btn-book-hero:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(248,68,100,0.5); }
    .btn-back {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      color: #f0f0f0; font-weight: 600; font-size: 0.9rem;
      padding: 13px 24px; border-radius: 50px;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-back:hover { background: rgba(255,255,255,0.12); }

    /* ── Detail Body ── */
    .detail-body {
      max-width: 1400px; margin: 0 auto; padding: 48px 40px 80px;
      display: grid; grid-template-columns: 1fr 380px; gap: 48px;
    }
    @media (max-width: 900px) {
      .detail-body { grid-template-columns: 1fr; padding: 28px 20px 60px; }
      .hero-content { padding: 0 20px; flex-direction: column; align-items: flex-start; gap: 20px; }
      .hero-poster { width: 120px; height: 180px; }
    }

    /* Info Section */
    .detail-info { display: flex; flex-direction: column; gap: 32px; }
    .info-card {
      background: #141416; border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px; padding: 28px;
    }
    .info-card h3 {
      font-size: 0.78rem; font-weight: 700; color: #5a5a70;
      text-transform: uppercase; letter-spacing: 2px;
      margin-bottom: 20px;
    }
    .stats-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;
    }
    .stat { display: flex; flex-direction: column; gap: 6px; }
    .stat-label { font-size: 0.78rem; color: #5a5a70; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
    .stat-value { font-size: 1.1rem; font-weight: 700; color: #f0f0f0; }
    .stat-value.accent { color: #f84464; }
    .stat-value.gold { color: #fbbf24; }

    /* Booking Sidebar Card */
    .sidebar-booking {
      background: #141416; border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px; padding: 28px;
      height: fit-content; position: sticky; top: 90px;
    }
    .sidebar-booking h3 {
      font-size: 1.1rem; font-weight: 700; margin-bottom: 6px;
    }
    .sidebar-booking .sub { font-size: 0.85rem; color: #a0a0b0; margin-bottom: 24px; }

    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .form-group label { font-size: 0.8rem; font-weight: 600; color: #a0a0b0; }
    .form-group input {
      background: #1c1c20; border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px; padding: 12px 16px;
      color: #f0f0f0; font-size: 0.9rem; font-family: 'Inter', sans-serif;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-group input:focus { outline: none; border-color: #f84464; box-shadow: 0 0 0 3px rgba(248,68,100,0.2); }
    .form-group input::placeholder { color: #3a3a4a; }

    /* Seat Map Styles */
    .screen-curve {
      text-align: center; font-size: 0.75rem; color: #a0a0b0; letter-spacing: 2px;
      margin-bottom: 24px; padding-bottom: 10px;
      border-bottom: 2px solid rgba(255,255,255,0.1);
      border-radius: 50%; width: 80%; margin-left: auto; margin-right: auto;
    }
    .seat-map {
      display: flex; flex-direction: column; gap: 8px; align-items: center;
      margin-bottom: 20px;
      max-height: 250px; overflow-y: auto; padding-right: 8px;
    }
    .seat-map::-webkit-scrollbar { width: 4px; }
    .seat-map::-webkit-scrollbar-thumb { background: #3a3a4a; border-radius: 4px; }
    .seat-row-letters { display: flex; align-items: center; justify-content: center; gap: 6px; }
    .row-label { width: 20px; font-size: 0.8rem; font-weight: 700; color: #5a5a70; text-align: right; margin-right: 6px; }
    .seat-box {
      width: 22px; height: 22px; border-radius: 4px;
      background: #1c1c20; border: 1px solid rgba(255,255,255,0.2);
      cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.55rem; font-weight: 700; color: transparent;
    }
    .seat-box:hover:not(.booked) { border-color: #f84464; color: #f0f0f0; }
    .seat-box.selected { background: #f84464; border-color: #f84464; color: #fff; box-shadow: 0 0 10px rgba(248,68,100,0.4); }
    .seat-box.booked { background: #2a2a35; border-color: #2a2a35; cursor: not-allowed; opacity: 0.5; }
    
    .seat-legend { display: flex; justify-content: center; gap: 16px; font-size: 0.75rem; color: #a0a0b0; }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-item .seat-box { width: 14px; height: 14px; cursor: default; pointer-events: none; }

    .price-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 0; border-top: 1px solid rgba(255,255,255,0.07);
      margin: 8px 0;
    }
    .price-label { font-size: 0.85rem; color: #a0a0b0; }
    .price-value { font-size: 1rem; font-weight: 700; color: #f0f0f0; }
    .price-total { font-size: 1.1rem; font-weight: 800; color: #f84464; }

    .btn-confirm {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #f84464, #ff6b35);
      color: #fff; font-weight: 700; font-size: 1rem;
      border: none; border-radius: 50px; cursor: pointer;
      transition: all 0.2s; font-family: 'Inter', sans-serif;
      box-shadow: 0 6px 24px rgba(248,68,100,0.3);
    }
    .btn-confirm:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(248,68,100,0.5); }
    .btn-confirm:disabled { opacity: 0.6; transform: none; cursor: not-allowed; }

    /* OTP Overlay */
    .otp-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
    }
    .otp-card {
      background: #141416; border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px; padding: 40px 36px;
      text-align: center; max-width: 400px; width: 90%;
      animation: slideUp 0.3s cubic-bezier(0.34,1.2,0.64,1);
    }
    @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .otp-icon { font-size: 3rem; margin-bottom: 16px; }
    .otp-card h2 { font-size: 1.4rem; font-weight: 800; margin-bottom: 8px; }
    .otp-card .otp-sub { font-size: 0.88rem; color: #a0a0b0; margin-bottom: 28px; }
    .otp-inputs { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
    .otp-digit {
      width: 48px; height: 58px;
      background: #1c1c20; border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px; text-align: center;
      font-size: 1.3rem; font-weight: 800; color: #f0f0f0;
      transition: border-color 0.2s, box-shadow 0.2s;
      font-family: 'Inter', sans-serif;
    }
    .otp-digit:focus { outline: none; border-color: #f84464; box-shadow: 0 0 0 3px rgba(248,68,100,0.2); }
    .otp-error { color: #f87171; font-size: 0.82rem; min-height: 20px; margin-bottom: 12px; }

    /* Toast */
    .toast {
      position: fixed; bottom: 32px; right: 32px; z-index: 999;
      display: flex; align-items: center; gap: 12px;
      background: #252529; border: 1px solid rgba(34,197,94,0.3);
      color: #f0f0f0; padding: 14px 22px;
      border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.5);
      font-weight: 500; font-size: 0.9rem;
      animation: slideInRight 0.4s cubic-bezier(0.34,1.2,0.64,1);
    }
    .toast.error { border-color: rgba(248,68,100,0.4); }
    @keyframes slideInRight { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    /* Auth Gate */
    .auth-gate {
      background: rgba(248,68,100,0.08); border: 1px solid rgba(248,68,100,0.25);
      border-radius: 12px; padding: 16px 20px;
      font-size: 0.88rem; color: #a0a0b0;
      margin-bottom: 16px; line-height: 1.5;
    }
    .auth-gate a { color: #f84464; font-weight: 600; cursor: pointer; }
    .loading-pulse { display: flex; flex-direction: column; gap: 16px; }
    .pulse-line { height: 20px; background: #1c1c20; border-radius: 6px; animation: shimmer 1.4s ease-in-out infinite; }
    @keyframes shimmer { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }

    /* ── Review Stars ── */
    .star-btn { font-size: 1.8rem; color: #3a3a4a; cursor: pointer; transition: 0.2s; user-select: none; }
    .star-btn:hover, .star-btn.active { color: #fbbf24; text-shadow: 0 0 10px rgba(251,191,36,0.5); }
    .review-item { background: #1c1c20; padding: 14px 18px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
    .review-user { font-size: 0.85rem; font-weight: 700; color: #f0f0f0; margin-bottom: 4px; display: flex; justify-content: space-between; }
    .review-stars { color: #fbbf24; font-size: 0.9rem; }
  </style>
</head>
<body>

  <!-- ── NAV ── -->
  <nav class="navbar" id="navbar">
    <div class="nav-inner">
      <a href="/" class="nav-logo">
        <span class="logo-icon">🎬</span>
        <span class="logo-text">CineBook</span>
      </a>
      <div class="nav-search" style="display:none"></div><!-- spacer -->
      <div class="nav-actions" id="navActions"></div>
    </div>
  </nav>

  <!-- ── HERO ── -->
  <section class="detail-hero" id="heroSection">
    <div class="hero-backdrop" id="heroBackdrop">
      <span class="hero-backdrop-emoji" id="heroEmoji">🎬</span>
    </div>
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <div class="hero-poster" id="heroPoster">🎬</div>
      <div class="hero-info">
        <div class="loading-pulse">
          <div class="pulse-line" style="width:80px;height:26px;border-radius:20px"></div>
          <div class="pulse-line" style="width:340px;height:44px"></div>
          <div class="pulse-line" style="width:280px;height:18px"></div>
          <div class="pulse-line" style="width:480px;height:54px"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- ── BODY ── -->
  <div class="detail-body">

    <!-- Left: Info -->
    <div class="detail-info" id="detailInfo">
      <div class="info-card">
        <h3>Movie Details</h3>
        <div class="loading-pulse">
          <div class="pulse-line" style="height:16px;width:100%"></div>
          <div class="pulse-line" style="height:16px;width:80%"></div>
        </div>
      </div>
    </div>

    <!-- Right: Booking Sidebar -->
    <div class="sidebar-booking" id="sidebarBooking">
      <h3>Book Tickets</h3>
      <p class="sub">Select seats and confirm below</p>

      <div id="authGate" class="auth-gate hidden">
        Please <a id="loginLink">login</a> or <a id="registerLink">register</a> to book tickets.
      </div>

      <form id="bookingForm">
        <div class="form-group">
          <label for="bookName">Full Name</label>
          <input type="text" id="bookName" placeholder="Your full name" required />
        </div>
        <div class="form-group">
          <label for="bookEmail">Email</label>
          <input type="email" id="bookEmail" placeholder="you@email.com" required />
        </div>
        <div class="seat-selection-container" style="margin-bottom: 20px;">
          <label class="seat-label" style="display: block; font-size: 0.8rem; font-weight: 600; color: #a0a0b0; margin-bottom: 12px;">Select Seats</label>
          <div class="screen-curve">SCREEN THIS WAY</div>
          <div class="seat-map" id="seatMap">
            <!-- Seats rendered via JS -->
            <div style="color: #a0a0b0; font-size: 0.8rem; text-align: center; padding: 20px;">Loading seats...</div>
          </div>
          <div class="seat-legend">
            <div class="legend-item"><div class="seat-box available"></div> Available</div>
            <div class="legend-item"><div class="seat-box selected"></div> Selected</div>
            <div class="legend-item"><div class="seat-box booked"></div> Booked</div>
          </div>
        </div>
        <div class="price-row">
          <span class="price-label">Price per seat</span>
          <span class="price-value">₹250</span>
        </div>
        <div class="price-row">
          <span class="price-label">Total</span>
          <span class="price-total" id="totalPrice">₹250</span>
        </div>
        <button type="submit" class="btn-confirm" id="confirmBtn">
          🎟️ Book Now
        </button>
      </form>
    </div>
  </div>


  <!-- ── Auth Modal ── -->
  <div class="modal-overlay hidden" id="authModal">
    <div class="modal modal--auth">
      <button class="modal-close" id="closeAuth">✕</button>
      <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin">Login</button>
        <button class="auth-tab" id="tabRegister">Register</button>
      </div>
      <form class="auth-form" id="loginForm">
        <h2 class="auth-title">Welcome Back</h2>
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" placeholder="you@email.com" required />
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="••••••••" required />
        </div>
        <p class="auth-error hidden" id="loginError"></p>
        <button type="submit" class="btn-book">Sign In</button>
      </form>
      <form class="auth-form hidden" id="registerForm">
        <h2 class="auth-title">Create Account</h2>
        <div class="form-group">
          <label for="regUsername">Username</label>
          <input type="text" id="regUsername" placeholder="johndoe" required />
        </div>
        <div class="form-group">
          <label for="regEmail">Email</label>
          <input type="email" id="regEmail" placeholder="you@email.com" required />
        </div>
        <div class="form-group">
          <label for="regPassword">Password</label>
          <input type="password" id="regPassword" placeholder="••••••••" required />
        </div>
        <p class="auth-error hidden" id="registerError"></p>
        <button type="submit" class="btn-book">Create Account</button>
      </form>
    </div>
  </div>

  <!-- ── Toast ── -->
  <div class="toast hidden" id="toast">
    <span id="toastIcon">✅</span>
    <span id="toastMsg">Done!</span>
  </div>

  <script>
    const API      = 'http://127.0.0.1:8000/api';
    const MOVIE_ID = "{{ movie_id }}";
    const PRICE    = 250;

    let currentUser = JSON.parse(localStorage.getItem('cinebook_user') || 'null');
    let authToken   = localStorage.getItem('cinebook_token') || null;
    let selectedSeats = [];
    let bookingId   = null;
    let bookEmail   = '';
    let movie       = null;

    /* ─── INIT ─── */
    document.addEventListener('DOMContentLoaded', () => {
      renderNav();
      loadMovie();
      loadReviews();
      setupSeatMap();
      setupBookingForm();
      setupAuthModal();
      updateSeatUI();
    });

    /* ─── NAV ─── */
    function renderNav() {
      const el = document.getElementById('navActions');
      if (currentUser) {
        el.innerHTML = `
          <div class="nav-user">
            <a href="/my-bookings/" style="color:#f84464; font-weight:bold; margin-right:15px; text-decoration:none;">My Tickets</a>
            <div class="nav-avatar">${currentUser.username[0].toUpperCase()}</div>
            <span class="nav-username">${currentUser.username}</span>
            <button class="nav-logout" id="logoutBtn">Logout</button>
          </div>`;
        document.getElementById('logoutBtn').onclick = () => {
          localStorage.clear(); location.reload();
        };
      } else {
        el.innerHTML = `
          <button class="nav-btn nav-btn--ghost" id="openLogin">Login</button>
          <button class="nav-btn nav-btn--primary" id="openRegister">Register</button>`;
        document.getElementById('openLogin').onclick  = () => openAuth('login');
        document.getElementById('openRegister').onclick = () => openAuth('register');
      }
    }

    /* ─── LOAD MOVIE ─── */
    async function loadMovie() {
      try {
        const res  = await fetch(`${API}/movies/${MOVIE_ID}/`);
        if (!res.ok) throw new Error('Movie not found');
        movie = await res.json();
        renderHero(movie);
        renderInfo(movie);
        document.title = `${movie.title} — CineBook`;
        // Pre-fill user data
        if (currentUser) {
          document.getElementById('bookEmail').value = currentUser.email || '';
          document.getElementById('bookName').value  = currentUser.username || '';
        }
        if (!currentUser) showAuthGate();
      } catch (err) {
        document.getElementById('heroSection').innerHTML =
          `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#a0a0b0;font-size:1.1rem;padding-top:80px">⚠️ Could not load movie. <a href="/" style="color:#f84464;margin-left:8px">Go back</a></div>`;
        console.error(err);
      }
    }

    const EMOJIS = { 'sci-fi':'🚀','action':'💥','drama':'🎭','comedy':'😂','thriller':'🔪','horror':'👻','romance':'❤️','adventure':'🗺️','animation':'🎨','fantasy':'🧙','crime':'🕵️','mystery':'🔍' };
    function getEmoji(genre) { return EMOJIS[(genre||'').toLowerCase()] || '🎬'; }

    function renderHero(m) {
      const emoji = getEmoji(m.genre);

      // Backdrop
      const backdrop = document.getElementById('heroBackdrop');
      if (m.poster) {
        backdrop.innerHTML = `<img src="${m.poster}" alt="${m.title}" referrerpolicy="no-referrer" onerror="this.style.display='none';"><span class="hero-backdrop-emoji">${emoji}</span>`;
      } else {
        backdrop.querySelector('.hero-backdrop-emoji').textContent = emoji;
      }

      // Poster box
      const poster = document.getElementById('heroPoster');
      if (m.poster) {
        poster.innerHTML = `<img src="${m.poster}" alt="${m.title}" referrerpolicy="no-referrer" onerror="this.onerror=null; this.outerHTML='${emoji}';">`;
      } else {
        poster.textContent = emoji;
      }

      // Info
      document.querySelector('.hero-info').innerHTML = `
        <span class="hero-genre-badge">${m.genre || 'Movie'}</span>
        <h1 class="hero-title">${m.title}</h1>
        <div class="hero-meta">
          ${m.rating ? `<span class="star">★</span><span class="rating-val">${m.rating}</span><span class="sep">•</span>` : ''}
          ${m.duration ? `<span>${m.duration} min</span><span class="sep">•</span>` : ''}
          <span>${m.genre || ''}</span>
        </div>
        <p class="hero-desc">${m.description || ''}</p>
        <div class="hero-actions">
          <button class="btn-book-hero" id="heroBookBtn">🎟️ Book Tickets</button>
          <button class="btn-back" onclick="history.back()">← Back</button>
        </div>`;
      document.getElementById('heroBookBtn').onclick = () =>
        document.getElementById('sidebarBooking').scrollIntoView({ behavior: 'smooth' });
    }

    function renderInfo(m) {
      document.getElementById('detailInfo').innerHTML = `
        <div class="info-card">
          <h3>Movie Details</h3>
          <div class="stats-grid">
            <div class="stat">
              <span class="stat-label">Genre</span>
              <span class="stat-value accent">${m.genre || '—'}</span>
            </div>
            <div class="stat">
              <span class="stat-label">Duration</span>
              <span class="stat-value">${m.duration ? m.duration + ' min' : '—'}</span>
            </div>
            <div class="stat">
              <span class="stat-label">Rating</span>
              <span class="stat-value gold">${m.rating ? '★ ' + m.rating : '—'}</span>
            </div>
          </div>
        </div>
        <div class="info-card">
          <h3>Synopsis</h3>
          <p style="color:#a0a0b0;line-height:1.8;font-size:0.95rem">${m.description || 'No description available.'}</p>
        </div>
        <div class="info-card">
          <h3>Ticket Price</h3>
          <div class="stats-grid">
            <div class="stat">
              <span class="stat-label">Standard</span>
              <span class="stat-value accent">₹250 / seat</span>
            </div>
            <div class="stat">
              <span class="stat-label">Available</span>
              <span class="stat-value">18 seats</span>
            </div>
            <div class="stat">
              <span class="stat-label">Format</span>
              <span class="stat-value">2D • 3D</span>
            </div>
          </div>
        </div>
        
        <div class="info-card">
          <h3>User Reviews & Ratings</h3>
          <div id="reviewsList" style="margin-top:20px;display:flex;flex-direction:column;gap:12px;">
            <div style="color:#a0a0b0;font-size:0.9rem">Loading reviews...</div>
          </div>
          
          <div style="margin-top:24px;border-top:1px solid rgba(255,255,255,0.08);padding-top:20px">
            <h4 style="margin-bottom:12px;font-size:0.9rem;color:#f0f0f0">Leave a Review</h4>
            <div id="authReviewGate" class="${currentUser ? 'hidden' : ''}">
              <p style="color:#f84464;font-size:0.85rem">Please <a href="#" onclick="openAuth('login');return false;" style="color:white">login</a> to leave a rating.</p>
            </div>
            <div id="reviewComposer" class="${currentUser ? '' : 'hidden'}">
              <div style="display:flex;gap:6px;margin-bottom:12px" id="starSelector">
                 <span class="star-btn" data-val="1">★</span>
                 <span class="star-btn" data-val="2">★</span>
                 <span class="star-btn" data-val="3">★</span>
                 <span class="star-btn" data-val="4">★</span>
                 <span class="star-btn" data-val="5">★</span>
              </div>
              <button class="btn-back" id="submitReviewBtn" style="padding:10px 20px;font-size:0.8rem">Submit Rating</button>
            </div>
          </div>
        </div>`;
        
      // Attach Star Selector Logic
      let selectedRating = 0;
      const stars = document.querySelectorAll('.star-btn');
      stars.forEach(star => {
        star.onclick = () => {
          selectedRating = parseInt(star.dataset.val);
          stars.forEach(s => s.classList.toggle('active', parseInt(s.dataset.val) <= selectedRating));
        };
      });
      
      document.getElementById('submitReviewBtn').onclick = async () => {
        if (!selectedRating) { showToast('Please select a star rating!', true); return; }
        try {
          const res = await fetch(`${API}/movies/${MOVIE_ID}/reviews/`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${authToken}` },
            body: JSON.stringify({ rating: selectedRating })
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data[0] || data.detail || 'Failed');
          showToast('Review submitted successfully!', false);
          loadReviews(); // Refresh review list
          loadMovie(); // Refresh main API to get new calculated average!
        } catch(e) { showToast(e.message, true); }
      };
    }

    async function loadReviews() {
      try {
        const res = await fetch(`${API}/movies/${MOVIE_ID}/reviews/`);
        const reviews = await res.json();
        const container = document.getElementById('reviewsList');
        if (!container) return; // Might not be rendered yet
        
        if (reviews.length === 0) {
          container.innerHTML = '<div style="color:#a0a0b0;font-size:0.9rem">No reviews yet. Be the first!</div>';
          return;
        }
        
        container.innerHTML = reviews.map(r => `
          <div class="review-item">
            <div class="review-user">
              <span>${r.user_username || 'User'}</span>
              <span class="review-stars">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</span>
            </div>
            <div style="font-size:0.75rem;color:#5a5a70">${new Date(r.created_at).toLocaleDateString()}</div>
          </div>
        `).join('');
      } catch (e) { console.error('Reviews load failed'); }
    }

    function showAuthGate() {
      const gate = document.getElementById('authGate');
      gate.classList.remove('hidden');
      gate.querySelector('#loginLink').onclick    = () => openAuth('login');
      gate.querySelector('#registerLink').onclick = () => openAuth('register');
    }

    /* ─── SEAT CONTROL ─── */
    async function setupSeatMap() {
      try {
        const res = await fetch(`${API}/movies/${MOVIE_ID}/seats/`);
        const data = await res.json();
        // Handle paginated or unpaginated response
        const seats = data.results ? data.results : data;
        renderSeatMap(seats);
      } catch (err) {
        document.getElementById('seatMap').innerHTML = '<div style="color:#f87171;">Failed to load seats</div>';
      }
    }

    function renderSeatMap(seats) {
      const seatMapEl = document.getElementById('seatMap');
      if (!seats || seats.length === 0) {
        seatMapEl.innerHTML = '<div style="color:#a0a0b0;">No seats available.</div>';
        return;
      }
      
      const rows = {};
      seats.forEach(s => {
        const row = s.seat_number.charAt(0);
        if(!rows[row]) rows[row] = [];
        rows[row].push(s);
      });
      
      let html = '';
      Object.keys(rows).sort().forEach(r => {
        rows[r].sort((a,b) => parseInt(a.seat_number.substring(1)) - parseInt(b.seat_number.substring(1)));
        html += `<div class="seat-row-letters"><div class="row-label">${r}</div>`;
        rows[r].forEach(seat => {
          const bookedClass = seat.is_booked ? 'booked' : 'available';
          html += `<div class="seat-box ${bookedClass}" data-seat="${seat.seat_number}">${seat.seat_number}</div>`;
        });
        html += `</div>`;
      });
      
      seatMapEl.innerHTML = html;
      
      document.querySelectorAll('.seat-box.available').forEach(box => {
        box.addEventListener('click', () => {
          const sn = box.dataset.seat;
          if(selectedSeats.includes(sn)) {
            selectedSeats = selectedSeats.filter(s => s !== sn);
            box.classList.remove('selected');
          } else {
            if(selectedSeats.length >= 10) { showToast('Max 10 seats allowed', true); return; }
            selectedSeats.push(sn);
            box.classList.add('selected');
          }
          updateSeatUI();
        });
      });
    }

    function updateSeatUI() {
      const count = selectedSeats.length;
      document.getElementById('totalPrice').textContent = count > 0 ? `₹${count * PRICE}` : '₹0';
      const btn = document.getElementById('confirmBtn');
      if(count === 0) {
        btn.disabled = true;
        btn.innerHTML = '🎟️ Select Seats to Book';
      } else {
        btn.disabled = false;
        btn.innerHTML = `🎟️ Book ${count} Ticket${count > 1 ? 's' : ''}`;
      }
    }

    /* ─── BOOKING ─── */
    function setupBookingForm() {
      document.getElementById('bookingForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!currentUser) { openAuth('login'); showToast('Please login first', true); return; }
        if (selectedSeats.length === 0) { showToast('Please select at least one seat', true); return; }
        
        const name  = document.getElementById('bookName').value.trim();
        const email = document.getElementById('bookEmail').value.trim();
        if (!name || !email) { showToast('Fill in all fields', true); return; }

        const btn = document.getElementById('confirmBtn');
        btn.disabled = true; btn.textContent = 'Redirecting to Checkout…';

        try {
          const res = await fetch(`${API}/bookings/create-checkout-session/`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${authToken}` },
            body: JSON.stringify({ 
              movie: MOVIE_ID, 
              name, 
              email, 
              seats: selectedSeats.length,
              seat_numbers: selectedSeats.join(',')
            }),
          });
          if (res.status === 401) {
            alert("Session expired. Please log in again.");
            localStorage.clear();
            window.location.href = '/';
            return;
          }
          const data = await res.json();
          if (!res.ok) throw new Error(JSON.stringify(data));

          // Redirect to Stripe Checkout
          if (data.checkout_url) {
            window.location.href = data.checkout_url;
          } else {
            throw new Error("Checkout URL not found");
          }
        } catch (err) {
          showToast('Payment initialization failed. Please try again.', true);
          console.error(err);
          btn.disabled = false; btn.textContent = '🎟️ Book Now';
        }
      });
    }

    /* ─── AUTH MODAL ─── */
    function openAuth(tab) {
      document.getElementById('authModal').classList.remove('hidden');
      switchTab(tab);
    }
    function setupAuthModal() {
      document.getElementById('closeAuth').onclick  = () => document.getElementById('authModal').classList.add('hidden');
      document.getElementById('tabLogin').onclick   = () => switchTab('login');
      document.getElementById('tabRegister').onclick = () => switchTab('register');
      document.getElementById('authModal').addEventListener('click', (e) => {
        if (e.target === document.getElementById('authModal')) document.getElementById('authModal').classList.add('hidden');
      });
      document.getElementById('loginForm').addEventListener('submit', handleLogin);
      document.getElementById('registerForm').addEventListener('submit', handleRegister);
    }
    function switchTab(tab) {
      const isLogin = tab === 'login';
      document.getElementById('tabLogin').classList.toggle('active', isLogin);
      document.getElementById('tabRegister').classList.toggle('active', !isLogin);
      document.getElementById('loginForm').classList.toggle('hidden', !isLogin);
      document.getElementById('registerForm').classList.toggle('hidden', isLogin);
    }
    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const err = document.getElementById('loginError');
      err.classList.add('hidden');
      try {
        const res  = await fetch(`${API}/auth/login/`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || data.error || 'Login failed');
        authToken   = data.access || data.token;
        currentUser = { email, username: data.username || email.split('@')[0] };
        localStorage.setItem('cinebook_token', authToken);
        localStorage.setItem('cinebook_user', JSON.stringify(currentUser));
        document.getElementById('authModal').classList.add('hidden');
        renderNav();
        document.getElementById('authGate').classList.add('hidden');
        document.getElementById('bookEmail').value = email;
        document.getElementById('bookName').value  = currentUser.username;
        showToast(`Welcome ${currentUser.username}! 🎬`, false);
      } catch (e) { err.textContent = e.message; err.classList.remove('hidden'); }
    }
    async function handleRegister(e) {
      e.preventDefault();
      const username = document.getElementById('regUsername').value.trim();
      const email    = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      const err = document.getElementById('registerError');
      err.classList.add('hidden');
      try {
        const res  = await fetch(`${API}/auth/register/`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(Object.values(data).flat().join(' '));
        showToast('Account created! Please login.', false);
        switchTab('login');
        document.getElementById('loginEmail').value = email;
      } catch (e) { err.textContent = e.message; err.classList.remove('hidden'); }
    }

    /* ─── TOAST ─── */
    let toastTimer;
    function showToast(msg, isError) {
      const t = document.getElementById('toast');
      document.getElementById('toastIcon').textContent = isError ? '⚠️' : '✅';
      document.getElementById('toastMsg').textContent  = msg;
      t.classList.toggle('error', isError);
      t.classList.remove('hidden');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.add('hidden'), 4000);
    }
  </script>
</body>
</html>
