{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Bookings — CineBook</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}?v=2">
  <style>
    body { background: #0d0d0f; color: #f0f0f0; margin: 0; font-family: 'Inter', sans-serif; }
    .page-header {
      padding: 120px 40px 40px; text-align: center;
      background: linear-gradient(to bottom, #1a0a12, #0d0d0f);
    }
    .page-header h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 12px; }
    .page-header p { color: #a0a0b0; font-size: 1.1rem; }
    
    .bookings-container {
      max-width: 1200px; margin: 0 auto; padding: 0 40px 80px;
      display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 32px;
    }
    .ticket-card {
      background: #141416; border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px; overflow: hidden; position: relative;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .ticket-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.6); }
    .ticket-header {
      height: 140px; background-size: cover; background-position: center; position: relative;
    }
    .ticket-header::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(to top, #141416, transparent);
    }
    .status-badge {
      position: absolute; top: 16px; right: 16px; z-index: 2;
      padding: 6px 14px; border-radius: 20px; font-size: 0.75rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px;
    }
    .status-confirmed { background: rgba(34,197,94,0.2); color: #4ade80; border: 1px solid rgba(34,197,94,0.4); }
    .status-pending { background: rgba(245,158,11,0.2); color: #fbbf24; border: 1px solid rgba(245,158,11,0.4); }
    .status-cancelled { background: rgba(248,68,100,0.2); color: #f84464; border: 1px solid rgba(248,68,100,0.4); }
    
    .ticket-body { padding: 24px; }
    .ticket-title { font-size: 1.25rem; font-weight: 800; margin-bottom: 20px; line-height: 1.3; }
    
    .ticket-details { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    .detail-item { display: flex; flex-direction: column; gap: 4px; }
    .detail-label { font-size: 0.75rem; color: #5a5a70; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
    .detail-value { font-size: 0.95rem; font-weight: 600; color: #e0e0e0; }
    
    .ticket-actions {
      padding-top: 20px; border-top: 1px dashed rgba(255,255,255,0.1);
      display: flex; gap: 12px;
    }
    .btn-action {
      flex: 1; padding: 12px; border-radius: 8px; font-size: 0.85rem; font-weight: 600;
      text-align: center; cursor: pointer; transition: all 0.2s; text-decoration: none;
      display: inline-flex; justify-content: center; align-items: center; gap: 8px;
    }
    .btn-download {
      background: rgba(248,68,100,0.1); color: #f84464; border: 1px solid rgba(248,68,100,0.3);
    }
    .btn-download:hover { background: rgba(248,68,100,0.2); }
    .btn-cancel {
      background: transparent; color: #a0a0b0; border: 1px solid rgba(255,255,255,0.1);
    }
    .btn-cancel:hover { background: rgba(255,255,255,0.05); color: #f0f0f0; }
    
    .empty-state {
      grid-column: 1 / -1; text-align: center; padding: 80px 20px;
    }
    .empty-state h3 { font-size: 1.5rem; margin-bottom: 12px; color: #f0f0f0; }
    .empty-state p { color: #a0a0b0; margin-bottom: 24px; }
    .btn-home {
      display: inline-flex; align-items: center; gap: 10px;
      background: linear-gradient(135deg, #f84464, #ff6b35); color: #fff;
      padding: 14px 32px; border-radius: 50px; text-decoration: none; font-weight: 700;
      box-shadow: 0 6px 24px rgba(248,68,100,0.35); transition: transform 0.2s;
    }
    .btn-home:hover { transform: translateY(-2px); }

    /* ─── Success Modal Styles ─── */
    .success-overlay {
      position: fixed; inset: 0; z-index: 2000;
      background: rgba(13,13,15,0.85); backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
    }
    .success-overlay.show { opacity: 1; pointer-events: auto; }
    .success-card {
      background: #141416; border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px; width: 90%; max-width: 440px;
      text-align: center; padding: 48px 36px;
      transform: translateY(30px) scale(0.95); transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }
    .success-overlay.show .success-card { transform: translateY(0) scale(1); }
    
    .success-icon-wrap {
      width: 80px; height: 80px; margin: 0 auto 24px;
      background: rgba(34,197,94,0.1); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      border: 2px solid rgba(34,197,94,0.3);
    }
    .success-icon { font-size: 36px; }
    
    .success-card h2 { font-size: 1.8rem; font-weight: 800; margin-bottom: 12px; color: #f0f0f0; }
    .success-card p { font-size: 1rem; color: #a0a0b0; line-height: 1.6; margin-bottom: 32px; }
    .success-btn {
      background: linear-gradient(135deg, #f84464, #ff6b35);
      color: #fff; font-weight: 700; font-size: 1.05rem; letter-spacing: 0.5px;
      border: none; border-radius: 50px; padding: 16px 32px; width: 100%;
      cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 8px 24px rgba(248,68,100,0.3);
    }
    .success-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(248,68,100,0.4); }
  </style>
</head>
<body>

  <nav class="navbar" id="navbar">
    <div class="nav-inner">
      <a href="/" class="nav-logo">
        <span class="logo-icon">🎬</span>
        <span class="logo-text">CineBook</span>
      </a>
      <div class="nav-actions" id="navActions"></div>
    </div>
  </nav>

  <header class="page-header">
    <h1>My Tickets</h1>
    <p>View and manage your movie bookings</p>
  </header>

  <div class="bookings-container" id="bookingList">
    <!-- Loading skeleton -->
    <div style="color: #a0a0b0; text-align: center; grid-column: 1/-1;">Loading your tickets...</div>
  </div>

  <!-- ── Success Modal ── -->
  <div class="success-overlay" id="successModal">
    <div class="success-card">
      <div class="success-icon-wrap">
        <span class="success-icon">🎉</span>
      </div>
      <h2>Booking Confirmed!</h2>
      <p>Your payment was successful. We've automatically sent the official ticket and QR code to your email address.</p>
      <button class="success-btn" onclick="document.getElementById('successModal').classList.remove('show')">View My Tickets</button>
    </div>
  </div>

  <script>
    const API = "http://127.0.0.1:8000/api";
    const token = localStorage.getItem("cinebook_token");
    const currentUser = JSON.parse(localStorage.getItem('cinebook_user') || 'null');

    document.addEventListener('DOMContentLoaded', () => {
      renderNav();
      if (!token) {
        window.location.href = '/';
        return;
      }
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get('payment') === 'success') {
          setTimeout(() => {
              document.getElementById('successModal').classList.add('show');
          }, 100);
          window.history.replaceState({}, document.title, window.location.pathname);
      }
      loadBookings();
    });

    function renderNav() {
      const el = document.getElementById('navActions');
      if (currentUser) {
        el.innerHTML = `
          <div class="nav-user">
            <a href="/my-bookings/" style="color:#f84464; font-weight:bold; margin-right:15px; text-decoration:none;">My Tickets</a>
            <div class="nav-avatar">${currentUser.username[0].toUpperCase()}</div>
            <span class="nav-username">${currentUser.username}</span>
            <button class="nav-logout" id="logoutBtn">Logout</button>
          </div>`;
        document.getElementById('logoutBtn').onclick = () => {
          localStorage.clear(); window.location.href = '/';
        };
      }
    }

    async function loadBookings(){
      try {
        const res = await fetch(`${API}/my-bookings/`, {
          headers: { "Authorization": "Bearer " + token }
        });
        if(res.status === 401) {
          localStorage.clear();
          window.location.href = '/';
          return;
        }
        let bookings = await res.json();
        if (bookings.results) {
          bookings = bookings.results;
        }
        renderBookings(bookings);
      } catch (e) {
        console.error("Failed to load bookings", e);
        document.getElementById("bookingList").innerHTML = `<div class="empty-state"><h3>Error</h3><p>Could not load bookings. Please try again later.</p></div>`;
      }
    }

    function renderBookings(bookings) {
      const container = document.getElementById("bookingList");
      container.innerHTML = "";

      if(bookings.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <h3>No Tickets Found</h3>
            <p>You haven't booked any movies yet.</p>
            <a href="/" class="btn-home">Browse Movies</a>
          </div>
        `;
        return;
      }

      bookings.forEach(b => {
        const date = new Date(b.created_at).toLocaleDateString('en-US', { day: 'numeric', month: 'short', year: 'numeric' });
        const bgImg = b.movie_poster || 'https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=800&q=80';
        
        let statusClass = 'status-pending';
        if(b.status === 'CONFIRMED') statusClass = 'status-confirmed';
        if(b.status === 'CANCELLED') statusClass = 'status-cancelled';

        let actionsHtml = '';
        if (b.status === 'CONFIRMED') {
          actionsHtml = `<button class="btn-action btn-download" onclick="downloadPdf('${b.booking_id}')">⏬ Download PDF</button>`;
        } else if (b.status === 'PENDING') {
           actionsHtml = `<button class="btn-action btn-cancel" onclick="cancelBooking('${b.booking_id}')">Cancel</button>`;
        }

        container.innerHTML += `
          <div class="ticket-card">
            <div class="ticket-header" style="background-image: url('${bgImg}');">
              <span class="status-badge ${statusClass}">${b.status}</span>
            </div>
            <div class="ticket-body">
              <h3 class="ticket-title">${b.movie_title || 'Movie Title'}</h3>
              
              <div class="ticket-details">
                <div class="detail-item">
                  <span class="detail-label">Date Booked</span>
                  <span class="detail-value">${date}</span>
                </div>
                <div class="detail-item">
                  <span class="detail-label">Ticket ID</span>
                  <span class="detail-value" style="font-size:0.75rem;">...${b.booking_id.substring(24)}</span>
                </div>
                <div class="detail-item">
                  <span class="detail-label">Quantity</span>
                  <span class="detail-value">${b.seats} Tickets</span>
                </div>
                <div class="detail-item">
                  <span class="detail-label">Seats</span>
                  <span class="detail-value">${b.seat_numbers || 'Not selected'}</span>
                </div>
              </div>

              ${actionsHtml ? `<div class="ticket-actions">${actionsHtml}</div>` : ''}
            </div>
          </div>
        `;
      });
    }

    async function cancelBooking(id) {
        if(!confirm("Are you sure you want to cancel this booking?")) return;
        try {
            const res = await fetch(`${API}/bookings/${id}/cancel/`, {
                method: 'POST',
                headers: { "Authorization": "Bearer " + token }
            });
            if(res.ok) {
                loadBookings();
            } else {
                alert("Could not cancel booking.");
            }
        } catch(e) { console.error(e); }
    }

    async function downloadPdf(id) {
        try {
            const res = await fetch(`${API}/bookings/${id}/pdf/`, {
                headers: { "Authorization": "Bearer " + token }
            });
            if(res.status === 401) {
                alert("Session expired. Please log in again.");
                localStorage.clear();
                window.location.href = '/';
                return;
            }
            if(!res.ok) {
                alert("Could not download pdf.");
                return;
            }
            const blob = await res.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            a.download = `ticket_${id}.pdf`;
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
        } catch(e) { console.error(e); }
    }
  </script>
</body>
</html>
